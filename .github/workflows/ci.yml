name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v5
        with:
          version: "10.33.4"
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"
      - run: make ci
