name: Package Release Rehearsal

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  rehearsal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v5
        with:
          version: "10.33.4"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - run: make ci
      - run: make release-artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: nsealr-companion-package-artifacts
          path: release-artifacts/packages/
          if-no-files-found: error
